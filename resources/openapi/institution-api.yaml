openapi: 3.0.3
info:
  title: ZAQA Institution Integration API
  version: "1.0.0"
  description: >
    Institution-facing API for submitting learner achievement records and looking up ZAQA verification status.

    This OpenAPI spec is intentionally limited to `/api/institution/v1/*` endpoints and does not expose internal admin/applicant APIs.

    **Authentication:** Bearer token (Sanctum) issued to an Institution API client. Each token is scoped to one awarding institution and a set of abilities (for example `learner-records:write`, `verification-records:lookup`).

    **Push vs Pull**
    - **Push (institution → ZAQA):** Institutions push learner achievement records using the endpoints in this spec. Records are staged as **pending submissions** and require ZAQA approval before entering the trusted learner records catalog.
    - **Pull (ZAQA → institution):** ZAQA may optionally configure a separate institution-specific pull lookup during auto-verification when internal records are not sufficient.
      That pull lookup endpoint is **not** part of this ZAQA Institution API spec.

    **Verification lookup:** Use `GET /api/institution/v1/verification-records/lookup` with ability `verification-records:lookup` to check verification/certificate status by official application or qualification reference. Results are scoped to the authenticated awarding institution.

servers:
  - url: /

tags:
  - name: Learner Records
    description: Submit and query learner achievement records scoped to the authenticated awarding institution.
  - name: Verification Records
    description: Lookup ZAQA verification status by official application or qualification reference.
  - name: Batches
    description: Track asynchronous batch ingestion.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
  schemas:
    SuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
    ErrorEnvelope:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        errors:
          type: object
          additionalProperties: true
    LearnerRecordPayload:
      type: object
      description: >
        Learner achievement record payload.
        At least one identifier is required: `student_id` OR `certificate_no` OR `nrc_number` OR `passport_no`.
      required: [first_name, last_name, program_of_study, year_awarded]
      properties:
        student_id:
          type: string
          nullable: true
          example: "STU-12345"
        certificate_no:
          type: string
          nullable: true
          example: "CERT-2024-0001"
        nrc_number:
          type: string
          nullable: true
          example: "123456/12/1"
        passport_no:
          type: string
          nullable: true
          example: "ZN1234567"
        first_name:
          type: string
          example: "Mary"
        last_name:
          type: string
          example: "Banda"
        other_names:
          type: string
          nullable: true
          example: "Chanda"
        gender:
          type: string
          nullable: true
          example: "F"
        program_of_study:
          type: string
          example: "Bachelor of Science in Nursing"
        year_awarded:
          type: integer
          example: 2024
        award_date:
          type: string
          format: date
          nullable: true
          example: "2024-09-30"
        source_reference:
          type: string
          nullable: true
          example: "INSTITUTION-REF-0001"
      example:
        student_id: "STU-12345"
        certificate_no: "CERT-2024-0001"
        nrc_number: "123456/12/1"
        passport_no: null
        first_name: "Mary"
        last_name: "Banda"
        other_names: "Chanda"
        gender: "F"
        program_of_study: "Bachelor of Science in Nursing"
        year_awarded: 2024
        award_date: "2024-09-30"
        source_reference: "INSTITUTION-REF-0001"
    SubmissionResult:
      type: object
      required: [submission_id, batch_reference, status]
      properties:
        submission_id:
          type: integer
          example: 123
        batch_reference:
          type: string
          example: LRB-2026-0001
        status:
          type: string
          example: pending
    BatchSubmissionResult:
      type: object
      required: [batch_reference, received, pending_review]
      properties:
        batch_reference:
          type: string
          example: LRB-2026-0002
        submission_batch_id:
          type: integer
          example: 42
        institution_api_batch_id:
          type: integer
          example: 10
        received:
          type: integer
          example: 50
        pending_review:
          type: integer
          example: 48
        failed_validation:
          type: integer
          example: 2
        message:
          type: string
          example: Records received and pending ZAQA review.
    LearnerRecordResult:
      type: object
      required: [learner_record_id, created]
      properties:
        learner_record_id:
          type: integer
          example: 123
        created:
          type: boolean
          example: true
    BatchCreateResult:
      type: object
      required: [batch_id, status]
      properties:
        batch_id:
          type: integer
          example: 10
        status:
          type: string
          example: pending
    BatchStatusResult:
      type: object
      required: [id, status, total, processed, inserted, updated, failed]
      properties:
        id:
          type: integer
          example: 10
        status:
          type: string
          example: processing
        total:
          type: integer
          example: 500
        processed:
          type: integer
          example: 100
        inserted:
          type: integer
          example: 80
        updated:
          type: integer
          example: 20
        failed:
          type: integer
          example: 0
        errors:
          type: array
          items:
            type: object
            properties:
              row:
                type: integer
              message:
                type: string
    VerificationLookupQualification:
      type: object
      required: [holder_name, title, awarding_institution, country]
      properties:
        holder_name:
          type: string
          example: Martin Mwale
        title:
          type: string
          example: Bachelor of Science in Information Systems and Technology
        awarding_institution:
          type: string
          example: University of Lusaka
        country:
          type: string
          example: Zambia
        award_date:
          type: string
          format: date
          nullable: true
          example: "2020-11-06"
    VerificationLookupCertificate:
      type: object
      required: [exists, revoked]
      properties:
        exists:
          type: boolean
          example: true
        type:
          type: string
          nullable: true
          enum: [verification, rejection]
          example: verification
        type_label:
          type: string
          nullable: true
          example: Verification Certificate
        number:
          type: string
          nullable: true
          example: CERT-2026-000008
        issued_at:
          type: string
          format: date
          nullable: true
          example: "2026-06-19"
        revoked:
          type: boolean
          example: false
        revoked_at:
          type: string
          format: date
          nullable: true
          example: null
        public_verification_url:
          type: string
          format: uri
          nullable: true
          example: https://verify.example.test/certificates/api-lookup-token
    VerificationLookupQualificationListItem:
      type: object
      properties:
        qualification_reference:
          type: string
          example: "2026-000245-01"
        application_reference:
          type: string
          example: "2026-000245"
        holder_name:
          type: string
          example: Martin Mwale
        qualification_title:
          type: string
          example: Bachelor of Science in Information Systems and Technology
        awarding_institution:
          type: string
          example: University of Lusaka
        status:
          type: string
          example: certificate_issued
        status_label:
          type: string
          example: Certificate Issued
        certificate_number:
          type: string
          nullable: true
          example: CERT-2026-000008
        public_verification_url:
          type: string
          format: uri
          nullable: true
    VerificationLookupFoundResponse:
      type: object
      required: [found, searched_by, status, status_label, message]
      properties:
        found:
          type: boolean
          example: true
        searched_by:
          type: string
          enum: [application_reference, qualification_reference]
          example: qualification_reference
        application_reference:
          type: string
          nullable: true
          example: "2026-000245"
        qualification_reference:
          type: string
          nullable: true
          example: "2026-000245-01"
        status:
          type: string
          description: >
            Applicant-safe status key. Common values: `in_review`, `returned_for_correction`, `approved`,
            `rejected`, `certificate_issued`, `certificate_revoked`, `completed`.
          example: certificate_issued
        status_label:
          type: string
          example: Certificate Issued
        message:
          type: string
          example: A ZAQA verification certificate has been issued for this qualification.
        qualification:
          $ref: '#/components/schemas/VerificationLookupQualification'
        certificate:
          $ref: '#/components/schemas/VerificationLookupCertificate'
        qualifications:
          type: array
          description: Present when an application reference matches multiple qualification records.
          items:
            $ref: '#/components/schemas/VerificationLookupQualificationListItem'
    VerificationLookupNotFoundResponse:
      type: object
      required: [found, message]
      properties:
        found:
          type: boolean
          example: false
        message:
          type: string
          example: No ZAQA verification record was found for the supplied reference.
    ValidationErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

security:
  - BearerAuth: []

paths:
  /api/institution/v1/learner-records:
    post:
      tags: [Learner Records]
      summary: Submit one learner record for ZAQA review
      description: >
        Accepts a learner record from the institution and stages it for ZAQA review.
        Records are not inserted into the trusted learner_records catalog until approved by an authorized ZAQA user.
        The awarding institution is inferred from the bearer token and not accepted from the payload.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LearnerRecordPayload'
            examples:
              fullRecord:
                summary: Full payload example
                value:
                  student_id: "STU-12345"
                  certificate_no: "CERT-2024-0001"
                  nrc_number: "123456/12/1"
                  passport_no: null
                  first_name: "Mary"
                  last_name: "Banda"
                  other_names: "Chanda"
                  gender: "F"
                  program_of_study: "Bachelor of Science in Nursing"
                  year_awarded: 2024
                  award_date: "2024-09-30"
                  source_reference: "INSTITUTION-REF-0001"
              withStudentId:
                summary: Student ID example
                value:
                  student_id: "STU-12345"
                  first_name: "Mary"
                  last_name: "Banda"
                  program_of_study: "Bachelor of Science in Nursing"
                  year_awarded: 2024
              withCertificateNo:
                summary: Certificate number example
                value:
                  certificate_no: "CERT-2024-0001"
                  first_name: "Mary"
                  last_name: "Banda"
                  program_of_study: "Bachelor of Science in Nursing"
                  year_awarded: 2024
      responses:
        "202":
          description: Accepted for ZAQA review
          content:
            application/json:
              schema:
                type: object
                required: [accepted, success, submission_id, batch_reference, status, message]
                properties:
                  accepted:
                    type: boolean
                    example: true
                  success:
                    type: boolean
                    example: true
                  submission_id:
                    type: integer
                    example: 123
                  batch_reference:
                    type: string
                    example: LRB-2026-0001
                  status:
                    type: string
                    example: pending
                  message:
                    type: string
                    example: Record received and pending ZAQA review.
                  data:
                    $ref: '#/components/schemas/SubmissionResult'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        "403":
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        "422":
          description: Validation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        "429":
          description: Rate limited
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/institution/v1/learner-records/batch:
    post:
      tags: [Learner Records, Batches]
      summary: Submit batch learner records for ZAQA review
      description: >
        Accepts a batch array of learner records and stages them for ZAQA review.
        Small batches may process inline; larger batches are queued.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [records]
              properties:
                records:
                  type: array
                  items:
                    $ref: '#/components/schemas/LearnerRecordPayload'
      responses:
        "200":
          description: Processed inline (small batch)
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: boolean
                  success:
                    type: boolean
                  batch_reference:
                    type: string
                  received:
                    type: integer
                  pending_review:
                    type: integer
                  failed_validation:
                    type: integer
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/BatchSubmissionResult'
        "202":
          description: Accepted for asynchronous processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: boolean
                  success:
                    type: boolean
                  batch_reference:
                    type: string
                  received:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      batch_id:
                        type: integer
                      batch_reference:
                        type: string
                      status:
                        type: string
        "422":
          description: Validation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/institution/v1/learner-records/search:
    get:
      tags: [Learner Records]
      summary: Search learner records by identifiers (scoped)
      description: >
        Returns learner records belonging to the authenticated awarding institution only.
      parameters:
        - in: query
          name: student_id
          schema: { type: string }
        - in: query
          name: certificate_no
          schema: { type: string }
        - in: query
          name: nrc_number
          schema: { type: string }
        - in: query
          name: passport_no
          schema: { type: string }
        - in: query
          name: year_awarded
          schema: { type: integer }
        - in: query
          name: program_of_study
          schema: { type: string }
        - in: query
          name: per_page
          schema: { type: integer, default: 25, maximum: 100 }
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /api/institution/v1/learner-records/{id}:
    get:
      tags: [Learner Records]
      summary: Fetch a learner record by ID (scoped)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Learner record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/institution/v1/verification-records/lookup:
    get:
      tags: [Verification Records]
      summary: Lookup verification record by reference
      description: >
        Search ZAQA verification records using **exactly one** of `application_reference` or
        `qualification_reference`.

        **Search rules**
        - Provide one reference only (not both).
        - Minimum three characters; exact or prefix match on indexed fields (`applications.application_number`, `qualifications.verification_reference_number`).
        - No name, NRC, institution name, or qualification title search.

        **Authorization**
        - Requires bearer token ability `verification-records:lookup`.
        - Results are scoped to qualifications awarded by the authenticated institution (`awarding_institution_id`).

        **Privacy**
        Responses are applicant-safe and never include NRC/passport, internal comments, payment data, officer names, or internal revocation reasons.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: application_reference
          description: ZAQA application reference (e.g. whole submission).
          schema:
            type: string
            minLength: 3
            example: "2026-000245"
        - in: query
          name: qualification_reference
          description: ZAQA qualification verification reference (single record).
          schema:
            type: string
            minLength: 3
            example: "2026-000245-01"
      responses:
        "200":
          description: Verification record found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationLookupFoundResponse'
              examples:
                qualificationReferenceFound:
                  summary: Qualification reference — certificate issued
                  value:
                    found: true
                    searched_by: qualification_reference
                    application_reference: "2026-000245"
                    qualification_reference: "2026-000245-01"
                    status: certificate_issued
                    status_label: Certificate Issued
                    message: A ZAQA verification certificate has been issued for this qualification.
                    qualification:
                      holder_name: Martin Mwale
                      title: Bachelor of Science in Information Systems and Technology
                      awarding_institution: University of Lusaka
                      country: Zambia
                      award_date: "2020-11-06"
                    certificate:
                      exists: true
                      type: verification
                      type_label: Verification Certificate
                      number: CERT-2026-000008
                      issued_at: "2026-06-19"
                      revoked: false
                      revoked_at: null
                      public_verification_url: https://verify.example.test/certificates/api-lookup-token
                applicationReferenceMultiple:
                  summary: Application reference — multiple qualifications
                  value:
                    found: true
                    searched_by: application_reference
                    application_reference: "2026-000245"
                    qualification_reference: null
                    status: in_review
                    status_label: Multiple qualifications
                    message: Multiple qualification records were found for this application reference.
                    qualifications:
                      - qualification_reference: "2026-000245-01"
                        application_reference: "2026-000245"
                        holder_name: Martin Mwale
                        qualification_title: Bachelor of Science in Information Systems and Technology
                        awarding_institution: University of Lusaka
                        status: certificate_issued
                        status_label: Certificate Issued
                        certificate_number: CERT-2026-000008
                        public_verification_url: https://verify.example.test/certificates/api-lookup-token
                      - qualification_reference: "2026-000245-02"
                        application_reference: "2026-000245"
                        holder_name: Second Holder
                        qualification_title: Diploma B
                        awarding_institution: University of Lusaka
                        status: in_review
                        status_label: In Review
                        certificate_number: null
                        public_verification_url: null
                certificateRevoked:
                  summary: Qualification reference — certificate recalled
                  value:
                    found: true
                    searched_by: qualification_reference
                    application_reference: "2026-000245"
                    qualification_reference: "2026-000245-01"
                    status: certificate_revoked
                    status_label: Certificate Recalled
                    message: The reference is recognized, but the certificate is no longer valid.
                    qualification:
                      holder_name: Martin Mwale
                      title: Bachelor of Science in Information Systems and Technology
                      awarding_institution: University of Lusaka
                      country: Zambia
                      award_date: "2020-11-06"
                    certificate:
                      exists: true
                      type: verification
                      type_label: Verification Certificate
                      number: CERT-2026-000008
                      issued_at: "2026-06-19"
                      revoked: true
                      revoked_at: "2026-06-20"
                      public_verification_url: https://verify.example.test/certificates/api-lookup-token
        "401":
          description: Unauthorized (missing or invalid bearer token)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        "403":
          description: Forbidden (client disabled, inactive institution, or missing `verification-records:lookup` ability)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        "404":
          description: No matching record for the supplied reference (within institution scope)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationLookupNotFoundResponse'
              example:
                found: false
                message: No ZAQA verification record was found for the supplied reference.
        "422":
          description: Validation error (both references supplied, neither supplied, or reference too short)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                message: The given data was invalid.
                errors:
                  application_reference:
                    - Provide either an application reference or a qualification reference, not both.
                  qualification_reference:
                    - Provide either an application reference or a qualification reference, not both.
        "429":
          description: Rate limited (`institution-api` limiter; default 60 requests/minute per token)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/institution/v1/batches/{batchId}:
    get:
      tags: [Batches]
      summary: Batch ingestion status
      parameters:
        - in: path
          name: batchId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Batch status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BatchStatusResult'
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
